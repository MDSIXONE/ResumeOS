name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests and validate vault
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run pytest
        run: |
          pytest tests/

      - name: Validate vault
        run: |
          python scripts/validate-vault.py

      - name: Check for lint errors
        run: |
          python -m py_compile scripts/validate-vault.py
          echo "Python syntax check passed"
